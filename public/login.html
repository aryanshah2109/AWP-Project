<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | College ERP</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell auth-shell">
      <section class="hero auth-hero">
        <p class="eyebrow">Welcome</p>
        <h1>College ERP System</h1>
        <p class="hero-copy">
          Sign in to access dedicated dashboards for managing students, faculty,
          attendance, and student reports.
        </p>
      </section>

      <section class="card auth-card">
        <h2>Login</h2>
        <div class="role-switch">
          <button id="adminTab" class="tab active" type="button">Admin</button>
          <button id="facultyTab" class="tab" type="button">Faculty</button>
          <button id="studentTab" class="tab" type="button">Student</button>
        </div>

        <form id="adminLoginForm" class="stack">
          <input type="text" id="adminUsername" placeholder="Admin username" value="admin" required />
          <input type="password" id="adminPassword" placeholder="Admin password" value="admin123" required />
          <button type="submit">Login as Admin</button>
        </form>

        <form id="facultyLoginForm" class="stack hidden">
          <input type="text" id="facultyLoginId" placeholder="Faculty ID" required />
          <input type="password" id="facultyLoginPassword" placeholder="Password" required />
          <button type="submit">Login as Faculty</button>
        </form>

        <form id="studentLoginForm" class="stack hidden">
          <input type="text" id="studentEnrollmentNo" placeholder="Enrollment number" required />
          <input type="password" id="studentPassword" placeholder="Password" required />
          <button type="submit">Login as Student</button>
        </form>

        <p id="loginMessage" class="message"></p>
      </section>
    </div>

    <script src="shared.js"></script>
    <script src="login.js"></script>
  </body>
</html>
